name: 2033 Journey Cron Trigger

# 2026-04-15 更新: CF Worker scheduled() (:07) が AI Gateway 経由で
# 本番稼働する構成に移行。このGHA (:13) は保険として並走する。
# catchup=1 を付けることで、CF側が :07 で成功していれば
# last_generated<45分 として skip される（重複生成防止）。
# CF側が失敗した場合のみ実質的に動作し、復旧時間を最大1時間→最大13分に短縮。
#
# GHA cron は最大15分程度の遅延があり得るが、catchup の性質上許容範囲。

on:
  schedule:
    - cron: '13 * * * *'   # 毎時:13（素数分、CF :07 の6分後で復旧用）
  workflow_dispatch:        # 手動トリガー（UI or gh CLI から）

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5    # 念のための上限（通常 skip なら数秒、実行時は 100秒 前後）
    steps:
      - name: Trigger 2033 Journey /run (catchup mode)
        run: |
          echo "Triggering catchup at $(date -u +%H:%M:%S) UTC"
          curl -sS --max-time 180 -w "\nHTTP:%{http_code} time:%{time_total}s\n" \
            "https://2033journey.com/run?key=${{ secrets.RUN_KEY }}&catchup=1"
